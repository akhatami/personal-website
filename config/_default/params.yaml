# SITE SETUP
# Guide: https://wowchemy.com/docs/getting-started/
# Documentation: https://wowchemy.com/docs/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance

appearance:
  theme_day: minimal
  theme_night: minimal
  font: minimal
  font_size: L

# SEO

marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'Personal website of Ali Khatami'
    twitter: '_akhatami_'
  analytics:
    google_analytics: 'G-QNJ1YQ79ZK'
    baidu_tongji: ''
  verification:
    google: ''
    baidu: ''

# Site header

header:
  navbar:
    enable: true
    align: l
    show_logo: true
    show_language: false
    show_day_night: true
    show_search: true
    highlight_active_link: true

# Contact details
email: "info@akhatami.com"
phone: ''

# Address
# For country_code, use the 2-letter ISO code (see https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2 )
address:
  street: Van Mourik Broekmanweg 6
  city: Delft
  region: South-Holland
  postcode: 2628 XE
  country: The Netherlands
  country_code: NL

# Geographic coordinates
# To get your coordinates, right-click on Google Maps and choose "What's here?". The coords will show up at the bottom.
coordinates:
  latitude: "37.4275"
  longitude: "-122.1697"

# Directions for visitors to locate you.
directions: Room 28.4.W780 (building 28)

# Office hours
# A list of your office hours. To remove, set to an empty list `[]`.
office_hours: []

# Enter an optional link for booking appointments (e.g. calendly.com).
appointment_url: ""

# Contact links
# Set to `[]` to disable, or comment out unwanted lines with a hash `#`.
contact_links:
  - icon: twitter
    icon_pack: fab
    name: DM Me
    link: "https://twitter.com/_akhatami_"
  # - icon: skype
  #   icon_pack: fab
  #   name: Skype Me
  #   link: ""
#  - icon: keybase
#    icon_pack: fab
#    name: Chat on Keybase
#    link: 'https://keybase.io/'
#  - icon: comments
#    icon_pack: fas
#    name: Discuss on Forum
#    link: 'https://discourse.gohugo.io'

# Site footer

footer:
  copyright:
    notice: '© {year} Ali Khatami. This work is licensed under {license}.'
    license:
      enable: true
      allow_derivatives: true
      share_alike: false
      allow_commercial: true

# Localization

locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us

# Site features

features:
  syntax_highlighter:
    enable: true
    extra_languages:
      - r
      - latex
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/akhatami/personal-website'
    content_dir: content
    branch: master
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ''
    disqus:
      shortname: ''
      show_count: true
    commento:
      url: ''
  search:
    provider: wowchemy
    algolia:
      app_id: ''
      api_key: ''
      index_name: ''
      show_logo: false
  map:
    provider: ''
    api_key: ''
    zoom: 15

# Extensions

extensions:
  cms:
    branch: main
    local_backend: false
  academicons:
    enable: true
